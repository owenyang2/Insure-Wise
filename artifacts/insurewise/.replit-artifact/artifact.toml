kind = "web"
previewPath = "/"
title = "InsureWise"
version = "1.0.0"
id = "artifacts/insurewise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18732
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/insurewise run dev"

[services.env]
PORT = "18732"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/insurewise", "run", "build"]
publicDir = "artifacts/insurewise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
